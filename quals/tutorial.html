<style>
  /* Kiosk layout: the graph gets every pixel the viewport has, minus a
     slim control bar; nothing scrolls */
  html { height: 100%; }
  body {
    display: flex;
    flex-direction: column;
    height: 100%;
    /* svh, not dvh: the small viewport height is what's visible with all
       browser toolbars up, and since this page never scrolls, mobile
       toolbars never collapse -- dvh would park the buttons under them
       (observed on iOS Safari) */
    height: 100svh;
    overflow: hidden;
  }
  #stage { flex: 1; min-height: 0; position: relative; }
  #sandbox { width: 100%; height: 100%; }
  /* The caption banner is HTML floating above the svg, where graph
     redraws can't wipe it (and where phones get readable type) */
  #caption {
    position: absolute;
    /* Ride on the graph's drawn area: the svg (696x553 viewBox) centers
       vertically in the stage on portrait screens, so its top edge sits
       at 50% minus half its rendered height (79.45vw tall when width-
       constrained); on landscape the graph fills the stage and 3% wins */
    top: max(3%, calc(50% - 37.3vw));
    left: 50%;
    transform: translateX(-50%);
    padding: .45em 1em;
    border: 1px solid #b8a94a;
    border-radius: 8px;
    background: #fffbd8f0;
    color: var(--ink);
    /* Track the graph's scale, like the svg caption this replaced (the
       graph renders at min(width, height*aspect)); every caption fit on
       one line at this ratio in the svg, so it fits here too */
    font-size: min(2.9vw, 3.6vh);
    line-height: 1.3;
    white-space: nowrap;
    text-align: center;
    pointer-events: none;
  }
  #caption:empty { display: none; }
  /* The svg has a viewBox, so freeing both dimensions scales the graph
     to fit whatever box the flexbox hands it */
  #sandbox svg.bmndrsvg { display: block; width: 100%; height: 100%; }
  .tutorialbar { display: flex; flex: none; justify-content: center;
                 align-items: center; gap: 14px;
                 /* keep clear of the iPhone home indicator */
                 padding: 10px 10px max(10px, env(safe-area-inset-bottom)); }
  /* Fixed width so the buttons don't shift as the numbers change */
  .slidepos { min-width: 4.5em; text-align: center; color: var(--muted);
              font-size: .9rem; }
  .tutorialbar .bmdrbtn { min-width: 96px; min-height: 44px; }
</style>

// Chapters: the runs of steps between PAUSEs, as [start, end) ranges
const chap = []
for (let start = 0, i = 0; i <= anim.length; i++)
  if (i == anim.length || anim[i] === PAUSE) {
    chap.push([start, i])
    start = i+1
  }

// A chapter is a run of steps between PAUSEs -- typically a caption,
// its illustration, and pulse housekeeping. The buttons only move
// dest, the chapter the user wants to be on, and a single driver seeks
// it: forward by playing chapters in order (rushing every queued chapter
// except the last, which performs at the authored pace), backward -- 
// since bsandbox can't rewind -- by starting the goal over, replaying
// instantly to just before dest, then performing it. Going back means
// "show me that again". Either button aborts whatever's mid-flight, so
// mashing moves one chapter per click in either direction.
let cur = 0         // the chapter on screen
let dest = 0        // the chapter the user wants to be on
let playing = false // the driver is mid-run
let rush = false    // skip the current chapter's delays
let staging = false // rebuilding history: presentation calls are moot

const bprev = document.getElementById("prev")
const bnext = document.getElementById("next")
const slidepos = document.getElementById("slidepos")

// The score does all its presentation through gr: captions and highlight
// pulses. Captions render into the HTML banner, out of reach of graph
// redraws; pulses pass through to the live bgraph; and everything goes
// quiet while staging, since replaying history shouldn't flash stale
// captions or strand pulses.
const capdiv = document.getElementById("caption")
const pulse = (a) => (b) => { if (!staging) bs.getGraphObj()[a](b) }
gr = {
  msg:      (m) => { if (!staging) capdiv.textContent = m ?? "" },
  animYBR:  pulse("animYBR"),
  animData: pulse("animData"),
  animBuf:  pulse("animBuf"),
  animBux:  pulse("animBux"),
  animHor:  pulse("animHor"),
}

// The buttons gray out only at the ends of the show: they're always
// live to move dest
function refreshControls() {
  bprev.disabled = dest == 0
  bnext.disabled = dest == chap.length-1
  slidepos.textContent = (Math.max(cur, 0)+1) + "/" + chap.length
}

// bgraph anchors its drawing top-left (xMinYMin); recenter it in
// whatever box the viewport gives us
function fitGraph() {
  document.querySelector("#sandbox svg.bmndrsvg")
    .setAttribute("preserveAspectRatio", "xMidYMid meet")
}

// Naps are cancellable so a fast-forward can cut the one in flight
// short: rushing resolves the pending nap via curres
let curres = null
const nap = (ms) => new Promise((res) => {
  curres = res
  setTimeout(res, ms)
})

// Play chapter k at the authored pace, or instantly once rush is set
async function play(k) {
  const [from, to] = chap[k]
  for (let i = from; i < to; i++) {
    anim[i][1]()
    if (anim[i][0] > 0 && !rush) await nap(anim[i][0])
  }
  cur = k
  refreshControls() // the counter flips the moment the chapter lands
}

// Seek dest: chapters play toward it and clicks landing mid-run just
// move it (play() always runs to a chapter boundary first, so state is
// coherent whenever this loop checks)
async function drive() {
  playing = true
  refreshControls()
  while (cur != dest) {
    if (dest < cur) { // backward: start over, instantly to just before dest
      staging = true
      bs.newGoal("hustler", "d", 1, 0, true)
      fitGraph()
      for (let k = 0; k < dest; k++)
        for (let i = chap[k][0]; i < chap[k][1]; i++) anim[i][1]()
      staging = false
      cur = dest-1
      await nap(300) // a beat for the replay's redraws to land, so the
                     // target chapter's pulse starts on a settled graph
    }
    while (cur < dest) { // the forward leg; overshoot loops back around
      rush = dest - cur > 1 // rush every queued chapter but the last
      await play(cur+1)
    }
    rush = false
  }
  playing = false
  refreshControls()
}

// The buttons just move dest and poke: abort the delay in flight, or
// wake the driver if it's idle
function poke() {
  if (playing) { rush = true; curres?.() }
  else drive()
}
function next() { if (dest < chap.length-1) { dest++; poke() } }
function prev() { if (dest > 0)             { dest--; poke() } }

// Slideshows get arrow keys
document.onkeydown = (e) => {
  if (e.keyCode == 39) next()
  if (e.keyCode == 37) prev()
}

fitGraph()
cur = -1 // nothing on screen yet; seek the title card
drive()
